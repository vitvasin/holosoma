<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="#1e1e2e"/>
  <!-- Robot head -->
  <rect x="44" y="14" width="40" height="32" rx="6" fill="#89b4fa"/>
  <!-- Eyes -->
  <circle cx="56" cy="28" r="5" fill="#1e1e2e"/>
  <circle cx="72" cy="28" r="5" fill="#1e1e2e"/>
  <circle cx="57" cy="27" r="2" fill="#a6e3a1"/>
  <circle cx="73" cy="27" r="2" fill="#a6e3a1"/>
  <!-- Antenna -->
  <line x1="64" y1="14" x2="64" y2="6" stroke="#cdd6f4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="64" cy="5" r="3" fill="#f9e2af"/>
  <!-- Neck -->
  <rect x="60" y="46" width="8" height="6" rx="2" fill="#74c7ec"/>
  <!-- Body -->
  <rect x="36" y="52" width="56" height="40" rx="8" fill="#313244"/>
  <!-- Chest panel -->
  <rect x="46" y="60" width="36" height="22" rx="4" fill="#45475a"/>
  <rect x="50" y="64" width="10" height="4" rx="2" fill="#a6e3a1"/>
  <rect x="64" y="64" width="10" height="4" rx="2" fill="#89b4fa"/>
  <rect x="50" y="72" width="24" height="4" rx="2" fill="#f38ba8"/>
  <!-- Arms -->
  <rect x="16" y="54" width="18" height="34" rx="6" fill="#585b70"/>
  <rect x="94" y="54" width="18" height="34" rx="6" fill="#585b70"/>
  <!-- Hands -->
  <rect x="16" y="86" width="18" height="12" rx="5" fill="#45475a"/>
  <rect x="94" y="86" width="18" height="12" rx="5" fill="#45475a"/>
  <!-- Legs -->
  <rect x="42" y="92" width="18" height="28" rx="6" fill="#585b70"/>
  <rect x="68" y="92" width="18" height="28" rx="6" fill="#585b70"/>
  <!-- Feet -->
  <rect x="38" y="116" width="26" height="10" rx="4" fill="#45475a"/>
  <rect x="64" y="116" width="26" height="10" rx="4" fill="#45475a"/>
</svg>
